<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Session Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      padding: 20px;
    }
    .bg-pattern {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(99,102,241,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(16,185,129,0.10) 0%, transparent 50%);
    }
    .content { position: relative; z-index: 1; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px;
    }
    .logo-text { font-size: 13px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: #a0a0c0; }
    .date-label { font-size: 11px; color: #5a5a7a; }
    .status-card { border-radius: 16px; padding: 18px 20px; margin-bottom: 16px; }
    .status-card.productive  { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3); }
    .status-card.distracting { background: rgba(239,68,68,0.12);  border: 1px solid rgba(239,68,68,0.3); }
    .status-card.unknown     { background: rgba(99,102,241,0.10); border: 1px solid rgba(99,102,241,0.25); }
    .status-badge {
      display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px;
      border-radius: 20px; font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px;
    }
    .productive  .status-badge { background: rgba(16,185,129,0.2); color: #34d399; }
    .distracting .status-badge { background: rgba(239,68,68,0.2);  color: #f87171; }
    .unknown     .status-badge { background: rgba(99,102,241,0.2); color: #a5b4fc; }
    .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    .productive  .dot { background: #34d399; }
    .distracting .dot { background: #f87171; }
    .unknown     .dot { background: #a5b4fc; }
    .page-title {
      font-size: 15px; font-weight: 600; color: #e8e8f0; margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 240px;
    }
    .page-domain { font-size: 11px; color: #5a5a7a; }
    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .stat-block {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px; padding: 12px 14px;
    }
    .stat-label { font-size: 10px; color: #5a5a7a; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .stat-value { font-size: 20px; font-weight: 700; color: #e8e8f0; line-height: 1; }
    .stat-unit  { font-size: 11px; font-weight: 400; color: #5a5a7a; display: block; margin-top: 2px; }
    .progress-section { margin-bottom: 16px; }
    .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .progress-label { font-size: 11px; color: #5a5a7a; text-transform: uppercase; letter-spacing: 0.06em; }
    .progress-pct   { font-size: 11px; font-weight: 600; color: #a0a0c0; }
    .progress-bar-bg   { height: 6px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #6366f1, #10b981); transition: width 0.6s ease; }
    .view-btn {
      width: 100%; padding: 10px;
      border: 1px solid rgba(99,102,241,0.4); border-radius: 10px;
      background: rgba(99,102,241,0.1); color: #a5b4fc;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s ease;
    }
    .view-btn:hover { background: rgba(99,102,241,0.2); }
  </style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="content">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">⏱</div>
      <span class="logo-text">Tracker</span>
    </div>
    <span class="date-label" id="date-display"></span>
  </div>

  <div class="status-card unknown" id="status-card">
    <div class="status-badge"><span class="dot"></span><span id="status-label">Laden…</span></div>
    <div class="page-title"  id="page-title">–</div>
    <div class="page-domain" id="page-domain">–</div>
  </div>

  <div class="stats-row">
    <div class="stat-block">
      <div class="stat-label">Sessieduur</div>
      <div class="stat-value" id="session-duration">0</div>
      <span class="stat-unit">seconden</span>
    </div>
    <div class="stat-block">
      <div class="stat-label">Vandaag</div>
      <div class="stat-value" id="sessions-today">0</div>
      <span class="stat-unit">sessies</span>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-header">
      <span class="progress-label">Productief vandaag</span>
      <span class="progress-pct" id="productive-pct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <button class="view-btn" id="view-all-btn">all sessions ↗</button>
  <button class="view-btn" id="sendBatchBtn">Send batch now</button>  <!-- knop om de batch data direct naar de server te sturen -->
</div>
<script src="popup.js"></script>
</body>
</html>
